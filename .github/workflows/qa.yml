name: IHFK QA

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install raster validator
        run: python -m pip install --disable-pip-version-check Pillow
      - name: Validate runtime, locales, specs, and raster assets
        run: npm run check
